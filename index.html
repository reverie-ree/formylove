<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Vanessa</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #000000;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            font-family: 'Segoe UI', sans-serif;
        }
        canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1; opacity: 0;
            transition: opacity 2s ease-in-out;
        }
        .center-text {
            position: relative;
            z-index: 2; color: #ffffff;
            font-family: 'Georgia', serif;
            font-size: 1.6rem;
            font-style: italic;
            text-align: center;
            pointer-events: none;
            letter-spacing: 1px;
            padding: 0 20px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.6), 0 0 20px rgba(255, 30, 70, 0.4);
            animation: textPulse 4s ease-in-out infinite;
            opacity: 0;
            transition: opacity 2s ease-in-out;
        }
        .overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: #000000;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 1s ease, visibility 1s;
        }
        .envelope-btn {
            background: none;
            border: 2px solid #ff3366;
            color: #ff3366;
            padding: 15px 35px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(255, 51, 102, 0.4);
            transition: all 0.3s ease;
        }
        .overlay-hint {
            color: rgba(255, 255, 255, 0.5);
            margin-top: 15px;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }
        @keyframes textPulse {
            0%, 100% { transform: scale(1); opacity: 0.95; }
            50% { transform: scale(1.03); opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="overlay" id="musicOverlay">
        <button class="envelope-btn" onclick="startEffects()">💌 from bayi gede ireen</button>
        <p class="overlay-hint">(Turn up volume • wave to earth - seasons)</p>
    </div>

    <audio id="bgMusic" loop preload="auto">
        <source src="https://files.catbox.moe/rbt7sc.mp3" type="audio/mpeg">
    </audio>

    <canvas id="heartCanvas"></canvas>
    <div class="center-text" id="valentineText">i love gorgeous vanessa <33</div>

    <script>
        const canvas = document.getElementById('heartCanvas');
        const ctx = canvas.getContext('2d');
        const music = document.getElementById('bgMusic');
        const overlay = document.getElementById('musicOverlay');
        const valentineText = document.getElementById('valentineText');

        function startEffects() {
            music.play().catch(error => console.log("Audio playback failed:", error));
            overlay.style.opacity = '0';
            setTimeout(() => {
                overlay.style.visibility = 'hidden';
                canvas.style.opacity = '1';
                valentineText.style.opacity = '1';
            }, 1000);
        }

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Updated text loop forming the heart shape
        const textToRepeat = "i love gorgeous vanessa <33";
        const particles = [];
        const particleCount = 320; 

        function getHeartPoint(t) {
            return {
                x: 16 * Math.pow(Math.sin(t), 3),
                y: -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t))
            };
        }

        class Particle {
            constructor(t) {
                this.t = t;
                this.basePoint = getHeartPoint(t);
                this.size = 6 + Math.random() * 5; 
                this.pulseOffset = Math.random() * Math.PI * 2;
            }
            update(time) {
                const pulse = 1 + Math.sin(time * 3 + this.pulseOffset) * 0.08;
                const scale = (Math.min(canvas.width, canvas.height) / 28) * pulse;
                this.x = canvas.width / 2 + this.basePoint.x * scale;
                this.y = canvas.height / 2 + this.basePoint.y * scale;
            }
            draw() {
                ctx.save();
                ctx.font = `bold ${this.size}px Arial, sans-serif`;
                ctx.fillStyle = "rgba(255, 30, 70, 0.85)";
                ctx.shadowColor = "rgba(255, 0, 50, 1)";
                ctx.shadowBlur = 10;
                ctx.translate(this.x, this.y);
                ctx.rotate(this.t + Math.PI / 2); 
                ctx.fillText(textToRepeat, 0, 0);
                ctx.restore();
            }
        }

        for (let i = 0; i < particleCount; i++) {
            const t = (i / particleCount) * Math.PI * 2;
            particles.push(new Particle(t));
        }

        function animate(timestamp) {
            const time = timestamp * 0.001;
            ctx.fillStyle = "rgba(0, 0, 0, 0.15)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update(time);
                p.draw();
            });
            requestAnimationFrame(animate);
        }
        requestAnimationFrame(animate);
    </script>
</body>
</html>
